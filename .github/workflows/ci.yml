name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: az bicep build --file infra/azure/main.bicep
      - run: docker build -f apps/mail-ingress/Dockerfile -t ouro-mail-ingress:ci .
      - run: docker build -f apps/vault-control/Dockerfile -t ouro-vault-control:ci .
