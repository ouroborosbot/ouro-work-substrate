name: Deploy Azure

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      environment_name:
        description: Short deployment environment name
        required: true
        default: prod
      location:
        description: Azure region
        required: true
        default: eastus2
      mail_exposed_smtp_port:
        description: External SMTP port. Production MX uses 25; use nonstandard ports only for diagnostics.
        required: true
        default: "25"

permissions:
  contents: read
  id-token: write

concurrency:
  group: azure-${{ inputs.environment_name || vars.AZURE_ENVIRONMENT_NAME || 'prod' }}
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name || vars.AZURE_ENVIRONMENT_NAME || 'prod' }}
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_LOCATION: ${{ inputs.location || vars.AZURE_LOCATION || 'eastus2' }}
      AZURE_ENVIRONMENT_NAME: ${{ inputs.environment_name || vars.AZURE_ENVIRONMENT_NAME || 'prod' }}
      AZURE_MAIL_EXPOSED_SMTP_PORT: ${{ inputs.mail_exposed_smtp_port || vars.AZURE_MAIL_EXPOSED_SMTP_PORT || '25' }}
      AZURE_MAIL_INGRESS_MAX_RECIPIENTS: ${{ vars.AZURE_MAIL_INGRESS_MAX_RECIPIENTS || '100' }}
      AZURE_MAIL_INGRESS_MAX_CONNECTIONS: ${{ vars.AZURE_MAIL_INGRESS_MAX_CONNECTIONS || '100' }}
      AZURE_MAIL_INGRESS_CONNECTION_RATE_LIMIT_MAX: ${{ vars.AZURE_MAIL_INGRESS_CONNECTION_RATE_LIMIT_MAX || '120' }}
      AZURE_MAIL_INGRESS_CONNECTION_RATE_LIMIT_WINDOW_MS: ${{ vars.AZURE_MAIL_INGRESS_CONNECTION_RATE_LIMIT_WINDOW_MS || '60000' }}
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.DEPLOY_SHA }}
          fetch-depth: 0

      - uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Discover current deployed image
        id: current_image
        if: github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          current_image=""
          deployed_sha=""
          app_name="ouro-${AZURE_ENVIRONMENT_NAME}-mail-ingress"
          if [[ -n "${AZURE_RESOURCE_GROUP:-}" ]]; then
            current_image="$(az containerapp show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$app_name" \
              --query "properties.template.containers[?name=='mail-ingress'].image | [0]" \
              -o tsv 2>/dev/null || true)"
          fi
          if [[ "$current_image" == *":"* ]]; then
            deployed_sha="${current_image##*:}"
          fi
          echo "image=$current_image" >> "$GITHUB_OUTPUT"
          echo "deployed_sha=$deployed_sha" >> "$GITHUB_OUTPUT"
          {
            echo "### Current deployed image"
            echo
            echo "App: \`$app_name\`"
            if [[ -n "$current_image" ]]; then
              echo "Image: \`$current_image\`"
              echo "Detected deployed SHA: \`$deployed_sha\`"
            else
              echo "No current image could be inspected; deployment decision will be conservative."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Decide whether deployment is needed
        id: deploy_decision
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Manual deployment requested; deploying." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          deployed_sha="${{ steps.current_image.outputs.deployed_sha }}"
          should_deploy="$(scripts/should-auto-deploy-between.sh "$deployed_sha" "$DEPLOY_SHA" changed-files.txt auto-deploy-reason.txt)"
          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"
          reason="$(cat auto-deploy-reason.txt)"
          {
            echo "### Auto deploy decision"
            echo
            echo "Commit: \`${DEPLOY_SHA}\`"
            echo "Current deployed image SHA: \`${deployed_sha:-unknown}\`"
            echo "Decision: \`${should_deploy}\`"
            echo "Reason: $reason"
            echo
            echo "Changed files:"
            if [[ -s changed-files.txt ]]; then
              sed 's/^/- `/' changed-files.txt | sed 's/$/`/'
            else
              echo "- none recorded"
            fi
            echo
            echo "$reason"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Ensure Azure resource providers
        if: steps.deploy_decision.outputs.should_deploy == 'true'
        shell: bash
        run: |
          set -euo pipefail
          az provider register --namespace Microsoft.Communication --wait
          az provider register --namespace Microsoft.EventGrid --wait
          communication_state="$(az provider show --namespace Microsoft.Communication --query registrationState -o tsv)"
          event_grid_state="$(az provider show --namespace Microsoft.EventGrid --query registrationState -o tsv)"
          if [[ "$communication_state" != "Registered" ]]; then
            echo "Microsoft.Communication provider registration state is $communication_state, expected Registered." >&2
            exit 1
          fi
          if [[ "$event_grid_state" != "Registered" ]]; then
            echo "Microsoft.EventGrid provider registration state is $event_grid_state, expected Registered." >&2
            exit 1
          fi
          {
            echo "### Azure resource providers"
            echo
            echo "- Microsoft.Communication: \`$communication_state\`"
            echo "- Microsoft.EventGrid: \`$event_grid_state\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Ensure resource group and registry
        if: steps.deploy_decision.outputs.should_deploy == 'true'
        id: registry
        shell: bash
        run: |
          set -euo pipefail
          : "${AZURE_RESOURCE_GROUP:?AZURE_RESOURCE_GROUP repo variable is required}"
          az group create --name "$AZURE_RESOURCE_GROUP" --location "$AZURE_LOCATION" --tags product=ouro component=work-substrate
          deployment_name="registry-${GITHUB_RUN_ID}"
          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$deployment_name" \
            --template-file infra/azure/registry.bicep \
            --parameters location="$AZURE_LOCATION" environmentName="$AZURE_ENVIRONMENT_NAME" \
            --query properties.outputs \
            -o json > registry-outputs.json
          acr_name="$(jq -r '.containerRegistryName.value' registry-outputs.json)"
          acr_login_server="$(jq -r '.containerRegistryLoginServer.value' registry-outputs.json)"
          echo "acr_name=$acr_name" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$acr_login_server" >> "$GITHUB_OUTPUT"

      - name: Build and push images
        if: steps.deploy_decision.outputs.should_deploy == 'true'
        id: images
        shell: bash
        run: |
          set -euo pipefail
          acr_name="${{ steps.registry.outputs.acr_name }}"
          acr_login_server="${{ steps.registry.outputs.acr_login_server }}"
          az acr login --name "$acr_name"
          mail_ingress_image="$acr_login_server/ouro-mail-ingress:${DEPLOY_SHA}"
          mail_control_image="$acr_login_server/ouro-mail-control:${DEPLOY_SHA}"
          vault_control_image="$acr_login_server/ouro-vault-control:${DEPLOY_SHA}"
          docker build -f apps/mail-ingress/Dockerfile -t "$mail_ingress_image" .
          docker build -f apps/mail-control/Dockerfile -t "$mail_control_image" .
          docker build -f apps/vault-control/Dockerfile -t "$vault_control_image" .
          docker push "$mail_ingress_image"
          docker push "$mail_control_image"
          docker push "$vault_control_image"
          echo "mail_ingress_image=$mail_ingress_image" >> "$GITHUB_OUTPUT"
          echo "mail_control_image=$mail_control_image" >> "$GITHUB_OUTPUT"
          echo "vault_control_image=$vault_control_image" >> "$GITHUB_OUTPUT"

      - name: Deploy apps
        if: steps.deploy_decision.outputs.should_deploy == 'true'
        shell: bash
        env:
          MAIL_CONTROL_ADMIN_TOKEN: ${{ secrets.MAIL_CONTROL_ADMIN_TOKEN }}
          VAULT_CONTROL_ADMIN_TOKEN: ${{ secrets.VAULT_CONTROL_ADMIN_TOKEN }}
          MAIL_INGRESS_TLS_KEY: ${{ secrets.MAIL_INGRESS_TLS_KEY }}
          MAIL_INGRESS_TLS_CERT: ${{ secrets.MAIL_INGRESS_TLS_CERT }}
        run: |
          set -euo pipefail
          : "${MAIL_CONTROL_ADMIN_TOKEN:?MAIL_CONTROL_ADMIN_TOKEN secret is required}"
          : "${VAULT_CONTROL_ADMIN_TOKEN:?VAULT_CONTROL_ADMIN_TOKEN secret is required}"
          if { [[ -n "$MAIL_INGRESS_TLS_KEY" ]] && [[ -z "$MAIL_INGRESS_TLS_CERT" ]]; } || { [[ -z "$MAIL_INGRESS_TLS_KEY" ]] && [[ -n "$MAIL_INGRESS_TLS_CERT" ]]; }; then
            echo "MAIL_INGRESS_TLS_KEY and MAIL_INGRESS_TLS_CERT must be configured together." >&2
            exit 1
          fi
          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "apps-${GITHUB_RUN_ID}" \
            --template-file infra/azure/main.bicep \
            --parameters \
              location="$AZURE_LOCATION" \
              environmentName="$AZURE_ENVIRONMENT_NAME" \
              containerRegistryName="${{ steps.registry.outputs.acr_name }}" \
              mailIngressImage="${{ steps.images.outputs.mail_ingress_image }}" \
              mailControlImage="${{ steps.images.outputs.mail_control_image }}" \
              vaultControlImage="${{ steps.images.outputs.vault_control_image }}" \
              mailControlAdminToken="$MAIL_CONTROL_ADMIN_TOKEN" \
              vaultControlAdminToken="$VAULT_CONTROL_ADMIN_TOKEN" \
              mailExposedSmtpPort="$AZURE_MAIL_EXPOSED_SMTP_PORT" \
              mailIngressMaxRecipients="$AZURE_MAIL_INGRESS_MAX_RECIPIENTS" \
              mailIngressMaxConnections="$AZURE_MAIL_INGRESS_MAX_CONNECTIONS" \
              mailIngressConnectionRateLimitMax="$AZURE_MAIL_INGRESS_CONNECTION_RATE_LIMIT_MAX" \
              mailIngressConnectionRateLimitWindowMs="$AZURE_MAIL_INGRESS_CONNECTION_RATE_LIMIT_WINDOW_MS" \
              mailIngressTlsKey="$MAIL_INGRESS_TLS_KEY" \
              mailIngressTlsCert="$MAIL_INGRESS_TLS_CERT"

      - name: Show deployment outputs
        if: steps.deploy_decision.outputs.should_deploy == 'true'
        shell: bash
        run: |
          set -euo pipefail
          az deployment group show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "apps-${GITHUB_RUN_ID}" \
            --query properties.outputs \
            -o table

      - name: Report skipped deployment
        if: steps.deploy_decision.outputs.should_deploy != 'true'
        shell: bash
        run: |
          echo "Azure deployment skipped because no runtime, infrastructure, or workflow files changed since the current deployed image."
